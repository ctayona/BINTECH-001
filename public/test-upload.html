<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input { padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #5DAE60; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Upload Test</h1>
    
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="testUpload()">Test Upload</button>
    
    <div id="result"></div>
    
    <script>
        async function testUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const result = document.getElementById('result');
            
            if (!file) {
                result.innerHTML = '<p style="color: red;">Please select a file</p>';
                return;
            }
            
            result.innerHTML = '<p>Uploading...</p>';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('bucketName', 'profile-pictures');
                formData.append('userId', 'test-user-123');
                
                console.log('Sending upload request...');
                console.log('File:', file.name, file.size, file.type);
                
                const response = await fetch('/auth/upload', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.success) {
                    result.innerHTML = `
                        <p style="color: green;"><strong>✓ Upload successful!</strong></p>
                        <p>File: ${data.file.name}</p>
                        <p>Size: ${(data.file.size / 1024).toFixed(2)} KB</p>
                        <p>URL: <a href="${data.file.url}" target="_blank">${data.file.url}</a></p>
                    `;
                } else {
                    result.innerHTML = `
                        <p style="color: red;"><strong>✗ Upload failed</strong></p>
                        <p>Status: ${response.status}</p>
                        <p>Message: ${data.message}</p>
                        <p>Error: ${data.error || 'Unknown error'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <p style="color: red;"><strong>✗ Error</strong></p>
                    <p>${error.message}</p>
                `;
                console.error('Upload error:', error);
            }
        }
    </script>
</body>
</html>
