<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BinTECH – Bin Location Map</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{forest:'#1a3a2f',forestLight:'#2d5a47',cream:'#f8f5f0',creamDark:'#ede8e0',teal:'#3d8b7a',tealMuted:'#5a9e8f',moss:'#6b9080',sage:'#a4c3a2'},fontFamily:{sans:['Plus Jakarta Sans','system-ui','sans-serif']}}}}</script>
  <style>
    html,body{height:100%;margin:0;background:#f8f5f0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
    #map{width:100%;height:100%;z-index:1}
    
    /* Control Panel */
    .control-panel{position:absolute;top:1rem;left:1rem;background:white;border-radius:1rem;box-shadow:0 8px 24px rgba(15,51,41,.15);backdrop-filter:blur(10px);border:1px solid rgba(210,225,217,.8);z-index:1000;max-width:320px;animation:slideIn .3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    
    .panel-header{padding:1.25rem;border-bottom:2px solid rgba(210,225,217,.6)}
    .panel-title{font-size:1.1rem;font-weight:800;color:#173b30;margin:0;display:flex;align-items:center;gap:.5rem}
    .panel-icon{width:1.5rem;height:1.5rem;background:linear-gradient(135deg,#3d8b7a,#6b9080);border-radius:.5rem;display:flex;align-items:center;justify-content:center;color:white;font-size:.75rem}
    
    .panel-content{padding:1rem}
    .panel-text{font-size:.85rem;color:#6b9080;line-height:1.5;margin-bottom:1rem}
    
    .btn-group{display:flex;flex-direction:column;gap:.75rem}
    .btn{padding:.75rem 1rem;border-radius:.75rem;font-weight:600;font-size:.9rem;transition:all .2s ease;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:.5rem}
    
    .btn-primary{background:linear-gradient(135deg,#1a3a2f,#2f6b58);color:white;box-shadow:0 4px 12px rgba(20,54,44,.2)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(20,54,44,.3)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    
    .btn-secondary{background:transparent;border:2px solid #3d8b7a;color:#3d8b7a}
    .btn-secondary:hover{background:#3d8b7a;color:white}
    
    .btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:white;box-shadow:0 4px 12px rgba(220,38,38,.2)}
    .btn-danger:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(220,38,38,.3)}
    
    /* Stats Panel */
    .stats-panel{position:absolute;bottom:1rem;right:1rem;background:white;border-radius:1rem;box-shadow:0 8px 24px rgba(15,51,41,.15);backdrop-filter:blur(10px);border:1px solid rgba(210,225,217,.8);z-index:1000;padding:1rem;min-width:200px;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    
    .stat-item{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(210,225,217,.4)}
    .stat-item:last-child{border-bottom:none}
    .stat-label{font-size:.85rem;color:#6b9080;font-weight:600}
    .stat-value{font-size:1.25rem;font-weight:800;color:#173b30}
    
    /* Marker Popup */
    .leaflet-popup-content-wrapper{background:white;border-radius:.75rem;box-shadow:0 8px 24px rgba(15,51,41,.15);border:1px solid rgba(210,225,217,.8)}
    .leaflet-popup-content{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
    .popup-title{font-weight:800;color:#173b30;margin-bottom:.5rem;font-size:.95rem}
    .popup-coords{font-size:.8rem;color:#6b9080;font-family:monospace;margin-bottom:.75rem;padding:.5rem;background:#f8f5f0;border-radius:.5rem}
    .popup-actions{display:flex;gap:.5rem}
    .popup-btn{padding:.5rem .75rem;font-size:.75rem;border:none;border-radius:.5rem;cursor:pointer;font-weight:600;transition:all .2s ease}
    .popup-btn-delete{background:#dc2626;color:white}
    .popup-btn-delete:hover{background:#b91c1c}
    .popup-btn-copy{background:#3d8b7a;color:white}
    .popup-btn-copy:hover{background:#2f6b58}
    
    /* Notification */
    .notification{position:fixed;top:1rem;right:1rem;background:white;border-radius:.75rem;box-shadow:0 8px 24px rgba(15,51,41,.15);border-left:4px solid #3d8b7a;padding:1rem 1.5rem;z-index:2000;animation:slideInRight .3s ease;max-width:300px}
    @keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    .notification.success{border-left-color:#10b981}
    .notification.error{border-left-color:#dc2626}
    .notification-text{font-size:.9rem;color:#173b30;font-weight:600}
    
    /* Responsive */
    @media (max-width:768px){
      .control-panel{max-width:280px;top:.75rem;left:.75rem}
      .stats-panel{bottom:.75rem;right:.75rem;min-width:180px}
      .panel-title{font-size:1rem}
      .panel-text{font-size:.8rem}
      .btn{padding:.65rem .85rem;font-size:.85rem}
    }
    
    @media (max-width:480px){
      .control-panel{max-width:240px;top:.5rem;left:.5rem}
      .stats-panel{bottom:.5rem;right:.5rem;min-width:160px}
      .panel-title{font-size:.95rem}
      .panel-text{font-size:.75rem}
      .btn{padding:.6rem .75rem;font-size:.8rem}
      .stat-label{font-size:.75rem}
      .stat-value{font-size:1.1rem}
    }
  </style>
</head>
<body class="h-full">
  <div id="map"></div>
  
  <!-- Control Panel -->
  <div class="control-panel">
    <div class="panel-header">
      <h2 class="panel-title">
        <div class="panel-icon">📍</div>
        Bin Mapper
      </h2>
    </div>
    <div class="panel-content">
      <p class="panel-text">Click to place bins. View coordinates in popups.</p>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="exportBins()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export Bins
        </button>
        <button class="btn btn-secondary" onclick="toggleSatellite()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Satellite
        </button>
        <button class="btn btn-danger" onclick="clearAllBins()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Clear All
        </button>
      </div>
    </div>
  </div>
  
  <!-- Stats Panel -->
  <div class="stats-panel">
    <div class="stat-item">
      <span class="stat-label">Total Bins</span>
      <span class="stat-value" id="binCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Latitude</span>
      <span class="stat-value" id="currentLat" style="font-size:.9rem">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Longitude</span>
      <span class="stat-value" id="currentLng" style="font-size:.9rem">—</span>
    </div>
  </div>

  <script>
    // Map initialization
    let map;
    let binMarkers = [];
    let satelliteLayer;
    let osmLayer;
    let currentLayer = 'osm';

    function initMap() {
      // Create map centered on Manila
      map = L.map('map').setView([14.5995, 120.9842], 13);
      
      // OpenStreetMap layer
      osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);
      
      // Satellite layer (Esri)
      satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri',
        maxZoom: 19
      });
      
      // Map click handler
      map.on('click', function(e) {
        addBinMarker(e.latlng.lat, e.latlng.lng);
      });
      
      // Mouse move handler for coordinates
      map.on('mousemove', function(e) {
        document.getElementById('currentLat').textContent = e.latlng.lat.toFixed(4);
        document.getElementById('currentLng').textContent = e.latlng.lng.toFixed(4);
      });
    }

    function addBinMarker(lat, lng) {
      const binId = binMarkers.length + 1;
      
      // Create custom icon
      const customIcon = L.divIcon({
        html: `<div style="background:linear-gradient(135deg,#3d8b7a,#6b9080);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:16px;box-shadow:0 4px 12px rgba(61,139,122,.3);border:3px solid white">📍</div>`,
        iconSize: [32, 32],
        className: 'bin-marker'
      });
      
      // Create marker
      const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
      
      // Create popup content
      const popupContent = `
        <div style="min-width:200px">
          <div class="popup-title">Bin #${binId}</div>
          <div class="popup-coords">
            <div>Lat: ${lat.toFixed(6)}</div>
            <div>Lng: ${lng.toFixed(6)}</div>
          </div>
          <div class="popup-actions">
            <button class="popup-btn popup-btn-copy" onclick="copyCoords(${lat}, ${lng})">Copy</button>
            <button class="popup-btn popup-btn-delete" onclick="deleteBin(${binId - 1})">Delete</button>
          </div>
        </div>
      `;
      
      marker.bindPopup(popupContent);
      marker.openPopup();
      
      // Store marker data
      binMarkers.push({
        id: binId,
        lat: lat,
        lng: lng,
        marker: marker
      });
      
      // Update UI
      updateBinCount();
      showNotification(`Bin #${binId} placed at (${lat.toFixed(4)}, ${lng.toFixed(4)})`, 'success');
    }

    function deleteBin(index) {
      if (index >= 0 && index < binMarkers.length) {
        const bin = binMarkers[index];
        map.removeLayer(bin.marker);
        binMarkers.splice(index, 1);
        updateBinCount();
        showNotification(`Bin #${bin.id} deleted`, 'success');
      }
    }

    function clearAllBins() {
      if (binMarkers.length === 0) {
        showNotification('No bins to clear', 'error');
        return;
      }
      
      const confirmed = confirm(`Clear all ${binMarkers.length} bins? This cannot be undone.`);
      if (confirmed) {
        binMarkers.forEach(bin => {
          map.removeLayer(bin.marker);
        });
        binMarkers = [];
        updateBinCount();
        showNotification('All bins cleared', 'success');
      }
    }

    function updateBinCount() {
      document.getElementById('binCount').textContent = binMarkers.length;
    }

    function toggleSatellite() {
      if (currentLayer === 'osm') {
        map.removeLayer(osmLayer);
        map.addLayer(satelliteLayer);
        currentLayer = 'satellite';
        showNotification('Switched to satellite view', 'success');
      } else {
        map.removeLayer(satelliteLayer);
        map.addLayer(osmLayer);
        currentLayer = 'osm';
        showNotification('Switched to map view', 'success');
      }
    }

    function exportBins() {
      if (binMarkers.length === 0) {
        showNotification('No bins to export', 'error');
        return;
      }
      
      const data = {
        timestamp: new Date().toISOString(),
        totalBins: binMarkers.length,
        bins: binMarkers.map(bin => ({
          id: bin.id,
          latitude: bin.lat,
          longitude: bin.lng
        }))
      };
      
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bin-locations-${new Date().getTime()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      
      showNotification(`Exported ${binMarkers.length} bins`, 'success');
    }

    function copyCoords(lat, lng) {
      const coords = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      navigator.clipboard.writeText(coords).then(() => {
        showNotification('Coordinates copied to clipboard', 'success');
      });
    }

    function showNotification(message, type) {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.innerHTML = `<div class="notification-text">${message}</div>`;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.animation = 'slideInRight .3s ease reverse';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    // Initialize map on page load
    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
