<script>
// ── State ──────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const TYPE_COLORS = {
  Collection: { bg:'bg-teal',    text:'text-white',     dot:'#3d8b7a', badge:'bg-teal/10 text-teal' },
  Maintenance:{ bg:'bg-amber-400',text:'text-white',    dot:'#f59e0b', badge:'bg-amber-100 text-amber-700' },
  Alert:      { bg:'bg-red-400', text:'text-white',     dot:'#f87171', badge:'bg-red-100 text-red-600' },
  Meeting:    { bg:'bg-sage',    text:'text-forest',    dot:'#a4c3a2', badge:'bg-sage/30 text-forest' },
  Inspection: { bg:'bg-purple-400',text:'text-white',   dot:'#c084fc', badge:'bg-purple-100 text-purple-700' },
};

let today = new Date();
today.setHours(0,0,0,0);
let cursor = new Date(today);
let view   = 'month';
let editId = null;
let miniCursor = new Date(today);

// ── Data (loaded from backend) ─────────────────────────
let events = [];
let binsIndex = new Map();    // bin_id -> { id, label, location }
let usersIndex = new Map();   // system_id -> { id, label, role, email }

async function apiJson(url, options = {}) {
  const res = await fetch(url, options);
  let body = null;
  try { body = await res.json(); } catch (_) {}
  if (!res.ok) {
    const msg = body?.message || body?.error || `${res.status} ${res.statusText}`;
    throw new Error(msg);
  }
  return body;
}

function toIsoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseTimeHHMM(dateOrString) {
  try {
    let timeStr = '';
    
    // If it's an ISO string from Supabase (e.g., "2026-03-30T01:00:00Z")
    if (typeof dateOrString === 'string') {
      // Parse ISO string to Date object
      // JavaScript will automatically convert UTC to browser's local time
      const dateObj = new Date(dateOrString);
      
      if (!isNaN(dateObj.getTime())) {
        // getHours() / getMinutes() will return local time
        const hh = String(dateObj.getHours()).padStart(2, '0');
        const mm = String(dateObj.getMinutes()).padStart(2, '0');
        timeStr = `${hh}:${mm}`;
        console.log('[parseTimeHHMM] ISO string: ' + dateOrString);
        console.log('[parseTimeHHMM] Parsed as Date: ' + dateObj.toString());
        console.log('[parseTimeHHMM] Local time extracted: ' + timeStr);
        return timeStr;
      }
    }
    
    // If it's a Date object
    if (dateOrString instanceof Date && !isNaN(dateOrString.getTime())) {
      const hh = String(dateOrString.getHours()).padStart(2, '0');
      const mm = String(dateOrString.getMinutes()).padStart(2, '0');
      timeStr = `${hh}:${mm}`;
      console.log('[parseTimeHHMM] Date input: ' + dateOrString.toISOString() + ' → local time: ' + timeStr);
      return timeStr;
    }
    
    console.warn('[parseTimeHHMM] Invalid input type:', typeof dateOrString, dateOrString);
    return '00:00';
  } catch (err) {
    console.error('[parseTimeHHMM] Error:', err);
    return '00:00';
  }
}

function formatTime12(hhmm) {
  try {
    const [hStr, mStr] = String(hhmm || '00:00').split(':');
    let h = parseInt(hStr, 10);
    const m = mStr || '00';
    const isPm = h >= 12;
    h = h % 12;
    if (h === 0) h = 12;
    return `${h}:${m} ${isPm ? 'PM' : 'AM'}`;
  } catch (err) {
    console.error('[formatTime12] Error formatting:', hhmm, err);
    return '12:00 AM';
  }
}

function combineDateTime(dateIso, timeHHMM, endTimeHHMM = null) {
  try {
    const [y, m, d] = dateIso.split('-').map(Number);
    const [hh, mm] = (timeHHMM || '00:00').split(':').map(Number);
    
    // This is the KEY insight:
    // new Date(year, month, day, hour, minute) creates a Date in LOCAL time
    // .toISOString() automatically converts it to UTC regardless of browser timezone
    // So we DON'T need to manually calculate timezone offset!
    
    const localDate = new Date(y, m - 1, d, hh, mm, 0, 0);
    const isoString = localDate.toISOString();
    
    console.log('[combineDateTime] User entered: ' + dateIso + ' ' + timeHHMM);
    console.log('[combineDateTime] Created local Date: ' + localDate.toString());
    console.log('[combineDateTime] ISO UTC (auto-converted): ' + isoString);
    
    return isoString;
  } catch (err) {
    console.error('[combineDateTime] Error:', err, {dateIso, timeHHMM});
    return new Date().toISOString();
  }
}

function scheduleToEvent(s) {
  try {
    // Parse scheduled_at or fallback to scheduled_date
    const dateStr = s.scheduled_at || s.scheduled_date;
    if (!dateStr) {
      console.error('[scheduleToEvent] No date found in schedule:', s);
      return null;
    }
    
    console.log('[scheduleToEvent] Parsing scheduled_at from DB:', dateStr);
    
    // Extract date from ISO string (YYYY-MM-DD part)
    const dt = new Date(dateStr);
    if (isNaN(dt.getTime())) {
      console.error('[scheduleToEvent] Invalid date string:', dateStr);
      return null;
    }
    
    const date = toIsoDate(dt);
    
    // Extract time directly from ISO string to avoid timezone conversion issues
    // Pass the ISO string to parseTimeHHMM to extract HH:MM
    const start = parseTimeHHMM(dateStr);
    
    // Attempt to get end time from end_time field if it exists, otherwise default to +1 hour
    let end = start;
    if (s.end_time) {
      console.log('[scheduleToEvent] Parsing end_time from DB:', s.end_time);
      // Pass the ISO string to parseTimeHHMM to extract time
      end = parseTimeHHMM(s.end_time);
    } else {
      // Calculate default end time (+1 hour from start)
      const [hh, mm] = start.split(':').map(Number);
      const endHh = String((hh + 1) % 24).padStart(2, '0');
      end = `${endHh}:${String(mm).padStart(2, '0')}`;
    }
    
    const assigneeLabel = s.assigned_to ? (usersIndex.get(s.assigned_to)?.label || 'Assigned') : '';
    const binLabel = s.bin_id ? (binsIndex.get(s.bin_id)?.label || '') : '';
    
    // DEBUG: Log assigned_to handling - ensure it's a string, not an object
    let cleanedAssignedTo = s.assigned_to;
    if (typeof cleanedAssignedTo === 'object' && cleanedAssignedTo !== null) {
      console.warn('[scheduleToEvent] ⚠️ assigned_to is an object, extracting ID:', cleanedAssignedTo);
      cleanedAssignedTo = cleanedAssignedTo.id || cleanedAssignedTo.system_id || null;
    }
    
    console.log('[scheduleToEvent] Processing assigned_to:', {
      assigned_to_raw: s.assigned_to,
      assigned_to_type: typeof s.assigned_to,
      assigned_to_cleaned: cleanedAssignedTo,
      assigned_to_cleaned_type: typeof cleanedAssignedTo,
      found_in_usersIndex: cleanedAssignedTo ? usersIndex.has(cleanedAssignedTo) : false,
      assigneeLabel: assigneeLabel,
      usersIndexSize: usersIndex.size,
      firstFewKeys: Array.from(usersIndex.keys()).slice(0, 3)
    });
    
    const event = {
      id: s.id,
      title: s.task,
      type: 'Collection',
      date,
      start,
      end,
      assignee: assigneeLabel,
      assignee_id: cleanedAssignedTo || null,
      bin_id: s.bin_id || null,
      loc: binLabel,
      notes: s.notes || '',
      status: s.status || 'pending'
    };
    
    console.log('[scheduleToEvent] Converted event - Date: ' + date + ', Start: ' + start + ', End: ' + end + ', AssigneeID: ' + event.assignee_id);
    return event;
  } catch (err) {
    console.error('[scheduleToEvent] Error converting schedule:', err, s);
    return null;
  }
}

// ── Helpers ────────────────────────────────────────────
function fmtDate(iso){
  const [y,m,d]=iso.split('-');
  return `${MONTHS[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}
function eventsForDate(iso){
  const f=document.getElementById('type-filter').value;
  return events.filter(e=>e.date===iso && (f==='all'||e.type===f));
}
function filteredEvents(){
  const f=document.getElementById('type-filter').value;
  return f==='all' ? [...events] : events.filter(e=>e.type===f);
}

function setView(v){
  view=v;

    const btn=document.getElementById('view-'+id);

    btn.classList.toggle('text-moss',id!==v);

function renderView(){
  const container=document.getElementById('calendar-container');

// ─ Month view ─
function renderMonth(container){
  const year=cursor.getFullYear(), month=cursor.getMonth();
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const startDay=first.getDay();

  let html=`<div class="bg-white rounded-2xl shadow-sm overflow-hidden">`;
  // Day headers
  html+=`<div class="grid grid-cols-7 border-b border-creamDark">`;
  DAYS.forEach(d=>{ html+=`<div class="py-3 text-center text-xs font-semibold text-moss uppercase tracking-wider">${d}</div>`; });
  html+=`</div>`;

  // Grid
  html+=`<div class="grid grid-cols-7" style="min-height:520px">`;
  let cells=[];
  for(let i=0;i<startDay;i++) cells.push(null);
  for(let d=1;d<=last.getDate();d++) cells.push(new Date(year,month,d));
  while(cells.length%7!==0) cells.push(null);

  cells.forEach(date=>{
    if(!date){ html+=`<div class="border-b border-r border-creamDark bg-cream/40 min-h-24 p-1"></div>`; return; }
    const iso=toIsoDate(date);
    const isToday=date.getTime()===today.getTime();
    const evs=eventsForDate(iso);
    const dayNum=date.getDate();
    html+=`<div class="border-b border-r border-creamDark min-h-24 p-1 cal-day" onclick="dayClick('${iso}',event)">
      <div class="flex justify-end mb-1">
        <span class="w-7 h-7 flex items-center justify-center text-xs font-semibold rounded-full ${isToday?'bg-teal text-white':'text-forest'}">${dayNum}</span>
      </div>`;
    evs.slice(0,3).forEach(ev=>{
      const c=TYPE_COLORS[ev.type];
      html+=`<span class="event-pill ${c.bg} ${c.text} font-medium" onclick="event.stopPropagation();showDetail('${ev.id}',event)" title="${ev.title}">${formatTime12(ev.start)} ${ev.title}</span>`;
    });
    if(evs.length>3) html+=`<span class="text-xs text-moss pl-1 font-medium">+${evs.length-3} more</span>`;
    html+=`</div>`;
  });
  html+=`</div></div>`;
  container.innerHTML=html;
}

// ─ Week view ─
function renderWeek(container){
  const start=new Date(cursor);
  start.setDate(cursor.getDate()-cursor.getDay());
  const days=[];
  for(let i=0;i<7;i++){ const d=new Date(start); d.setDate(start.getDate()+i); days.push(d); }

  let html=`<div class="bg-white rounded-2xl shadow-sm overflow-hidden">`;
  html+=`<div class="grid grid-cols-7 border-b border-creamDark">`;
  days.forEach(d=>{
    const iso=toIsoDate(d);
    const isToday=d.getTime()===today.getTime();
    html+=`<div class="py-4 text-center cursor-pointer hover:bg-cream transition" onclick="dayClick('${iso}',event)">
      <p class="text-xs font-semibold text-moss uppercase">${DAYS[d.getDay()]}</p>
      <p class="text-xl font-bold mt-1 ${isToday?'text-teal':'text-forest'}">${d.getDate()}</p>
    </div>`;
  });
  html+=`</div>`;
  html+=`<div class="grid grid-cols-7" style="min-height:420px">`;
  days.forEach(d=>{
    const iso=toIsoDate(d);
    const evs=eventsForDate(iso);
    html+=`<div class="border-r border-creamDark p-2 space-y-1 min-h-40">`;
    evs.forEach(ev=>{
      const c=TYPE_COLORS[ev.type];
      html+=`<div class="event-pill ${c.bg} ${c.text} font-medium rounded-lg px-2 py-1.5 text-xs" onclick="showDetail('${ev.id}',event)" title="${ev.title}">
        <div class="font-semibold truncate">${ev.title}</div>

    html+=`</div>`;
  });
  html+=`</div></div>`;
  container.innerHTML=html;
}

  else if(view==='week'){ cursor.setDate(cursor.getDate()+dir*7); }
  else { cursor.setMonth(cursor.getMonth()+dir); }

}
function goToday(){ cursor=new Date(today); renderView(); }
function updateRangeLabel(){
  const el=document.getElementById('current-range');
  if(view==='month') el.textContent=`${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}`;
  else if(view==='week'){
    const start=new Date(cursor); start.setDate(cursor.getDate()-cursor.getDay());
    const end=new Date(start); end.setDate(start.getDate()+6);
    el.textContent=`${MONTHS[start.getMonth()]} ${start.getDate()} – ${MONTHS[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
  } else el.textContent=`All events — ${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}`;
}

      text: opt.text, 
      selected: opt.selected 
    }));
    console.log('[saveEvent] Dropdown options:', selectOptions);
    
    let assigned_to = rawValue;
    assigned_to = (assigned_to && assigned_to.trim() && assigned_to !== 'null') ? assigned_to.trim() : null;
    console.log('[saveEvent] Final assigned_to to send:', assigned_to, 'Format: ' + (assigned_to ? (assigned_to.includes('@') ? 'EMAIL' : assigned_to.match(/^[0-9a-f\-]{36}$/i) ? 'UUID' : 'OTHER') : 'NULL'));
    
    let bin_id = document.getElementById('ev-bin').value;
    bin_id = (bin_id && bin_id.trim()) ? bin_id.trim() : null;
    const status = document.getElementById('ev-status').value || 'pending';
    const notes = document.getElementById('ev-notes').value.trim();
    
    // Combine date and start time into scheduled_at timestamp
    const scheduled_at = combineDateTime(date, start);
    
    // Calculate end_time if there's a separate field (or store duration)
    const end_time = combineDateTime(date, end);
    
    console.log('[saveEvent] Payload:', {
      title,
      date,
      start,
      end,
      scheduled_at,
      end_time,
      assigned_to,
      bin_id,
      status,
      notes,
      isEdit: !!editId
    });
    
    // Verify time values are valid before sending
    console.log('[saveEvent] Time verification:', {
      dateValue: date,
      startValue: start,
      endValue: end,
      startParsed: new Date(`${date}T${start}:00`).toString(),
      endParsed: new Date(`${date}T${end}:00`).toString()
    });

    const apiPayload = {
      bin_id: bin_id || null,
      assigned_to: assigned_to || null,
      task: title,
      type: type,
      scheduled_at,
      end_time,
      status,
      notes,
      bin_label: bin_id ? (binsIndex.get(bin_id)?.label || null) : null
    };
    
    const onDone = () => {
      const assigneeName = assigned_to && usersIndex.get(assigned_to) 
        ? usersIndex.get(assigned_to).full_name || usersIndex.get(assigned_to).label
        : 'Unassigned';
      console.log(`[saveEvent] ✅ SUCCESS - Saved event with admin assigned to: ${assigneeName}`);
      closeModal();
      loadSchedules().catch(err => {
        console.error('[saveEvent] Failed to reload schedules:', err);
        alert('Saved, but failed to reload: ' + err.message);
      });
    };
    
    const onError = (err) => {
      console.error('[saveEvent] API error:', err);
      const errorMsg = err.message || 'Unknown error';
      alert(`Failed to ${editId ? 'update' : 'create'} schedule: ${errorMsg}`);
    };
    
    if (editId) {
      console.log('[saveEvent] Updating schedule:', editId);
      apiJson(`/api/admin/schedule/${editId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(apiPayload)
      }).then(onDone).catch(onError);
    } else {
      console.log('[saveEvent] Creating new schedule');
      apiJson('/api/admin/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(apiPayload)
      }).then(onDone).catch(onError);
    }
  } catch (err) {
    console.error('[saveEvent] Unexpected error:', err);
    alert('An unexpected error occurred: ' + err.message);
  }
}
function deleteEvent(){
  if(!editId) return;
  if(!confirm('Delete this event?')) return;
  apiJson(`/api/admin/schedule/${editId}`, { method: 'DELETE' })
    .then(() => {
      closeModal();
      loadSchedules().catch(err => alert(err.message));
    })
    .catch(err => alert(`Failed to delete schedule: ${err.message}`));
}
function confirmDelete(id){
  if(!confirm('Delete this event?')) return;
  apiJson(`/api/admin/schedule/${id}`, { method: 'DELETE' })
    .then(() => loadSchedules().catch(err => alert(err.message)))
    .catch(err => alert(`Failed to delete schedule: ${err.message}`));
}
function editEvent(id){ openModal(id); }
function shake(id){
  const el=document.getElementById(id);
  el.style.borderColor='#f87171';
  el.style.animation='shake .3s ease';
  setTimeout(()=>{ el.style.borderColor=''; el.style.animation=''; },500);
}

// ── Detail popup ───────────────────────────────────────
function showDetail(id, e){
  e.stopPropagation();
  closeDetail();
  const ev=events.find(x=>x.id===id);
  if(!ev) return;
  const c=TYPE_COLORS[ev.type];
  const popup=document.getElementById('detail-popup');
  document.getElementById('dp-type-badge').className=`text-xs font-semibold px-2.5 py-1 rounded-full ${c.badge}`;
  document.getElementById('dp-type-badge').textContent=ev.type;
  document.getElementById('dp-title').textContent=ev.title;
  document.getElementById('dp-date').textContent=fmtDate(ev.date);
  document.getElementById('dp-time').textContent=`${formatTime12(ev.start)} - ${formatTime12(ev.end)}`;
  const ar=document.getElementById('dp-assignee-row');
  ar.style.display=ev.assignee?'flex':'none';
  document.getElementById('dp-assignee').textContent=ev.assignee;
  const lr=document.getElementById('dp-loc-row');
  lr.style.display=ev.loc?'flex':'none';
  document.getElementById('dp-location').textContent=ev.loc;
  const nr=document.getElementById('dp-notes-row');
  nr.style.display=ev.notes?'flex':'none';
  document.getElementById('dp-notes').textContent=ev.notes;
  document.getElementById('dp-edit-btn').onclick=()=>{ closeDetail(); openModal(id); };
  document.getElementById('dp-del-btn').onclick=()=>{ closeDetail(); confirmDelete(id); };

  // Position
  const rect=e.target.getBoundingClientRect();
  popup.classList.remove('hidden');
  const pw=popup.offsetWidth, ph=popup.offsetHeight;
  let left=rect.right+8, top=rect.top;
  if(left+pw>window.innerWidth-16) left=rect.left-pw-8;
  if(top+ph>window.innerHeight-16) top=window.innerHeight-ph-16;
  if(top<8) top=8;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
function closeDetail(){ document.getElementById('detail-popup').classList.add('hidden'); }

// ── Close on outside click ──────────────────────────────
document.addEventListener('click',e=>{
  const detail = document.getElementById('detail-popup');
  if(detail && !detail.contains(e.target)) closeDetail();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeDetail(); }
});
const eventModal = document.getElementById('event-modal');
if (eventModal) {
  eventModal.addEventListener('click',e=>{
    if(e.target===eventModal) closeModal();
  });
}

// ── Init ──────────────────────────────────────────────
Promise.resolve()
  .then(() => {
    // If admin guard script is loaded, enforce it before API calls.
    if (typeof window.protectAdminPage === 'function') window.protectAdminPage();
  })
  .then(() => Promise.all([loadBins(), loadUsers()]))
  .then(() => loadSchedules())
  .catch(err => {
    console.error('Schedule init error:', err);
    alert(err.message || 'Failed to load schedules');
  });
</script>
